<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<link rel="icon" type="image/svg+xml" href="%sveltekit.assets%/logo_zfk_transparent.svg" />
		<link rel="apple-touch-icon" href="%sveltekit.assets%/logo_zfk_transparent.png" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="robots" content="noindex, nofollow" />
		<script>
			// set init theme (darkMode) and random hue
			(function () {
				const isDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
				document.documentElement.style.setProperty("--bg-lightness", isDark ? "10%" : "90%");
				document.documentElement.style.setProperty("--text-lightness", isDark ? "90%" : "10%");
				document.documentElement.style.setProperty("--bg-hue", Math.floor(Math.random() * 360));
			})();
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
